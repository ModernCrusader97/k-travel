<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="120" cy="160" r="130" fill="url(#bg)" opacity="0.5"/>
  <!-- Person body -->
  <ellipse cx="120" cy="230" rx="55" ry="40" fill="#2563eb" opacity="0.8"/>
  <!-- Head -->
  <circle cx="120" cy="140" r="48" fill="#fde68a"/>
  <!-- Eyes -->
  <circle cx="106" cy="135" r="6" fill="#1e293b"/>
  <circle cx="134" cy="135" r="6" fill="#1e293b"/>
  <circle cx="108" cy="133" r="2" fill="white"/>
  <circle cx="136" cy="133" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M107 155 Q120 168 133 155" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Card in hand -->
  <rect x="148" y="180" width="58" height="38" rx="6" fill="url(#card)" transform="rotate(-15 177 199)"/>
  <rect x="152" y="188" width="20" height="3" rx="1.5" fill="white" opacity="0.6" transform="rotate(-15 162 189)"/>
  <rect x="152" y="195" width="40" height="3" rx="1.5" fill="white" opacity="0.4" transform="rotate(-15 172 196)"/>
  <!-- Stars/sparkles -->
  <text x="30" y="80" font-size="20">✈️</text>
  <text x="185" y="60" font-size="16">⭐</text>
  <text x="40" y="200" font-size="14">💳</text>
</svg>
